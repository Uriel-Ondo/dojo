global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'flask-backend'
    static_configs:
      - targets: ['backend:5030']
    metrics_path: /metrics

  - job_name: 'flask-frontend'
    static_configs:
      - targets: ['frontend:5031']
    metrics_path: /metrics

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']